<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Тёмный фон -->
  <rect width="100" height="100" rx="24" fill="#0a0a0f"/>
  

  <!-- Задняя часть ленты (рисуется первой — уходит под пересечение) -->
  <path d="M9.5 50.0 C92.5 50.0 40 28.5 76.4 16.8 C64.6 5.1 45.4 2.5 32.5 9.5 C18.6 16.5 10.0 32.0 10.0 50.0 L10.0 50.0 C10.0 50.0 14.3 50.0" 
        fill="none" stroke="#4c1d95" stroke-width="6" stroke-linecap="round" opacity="0.6"/>
  

  <!-- Центральная линия — показывает полуоборот -->
  <path d="M92.5 50.0 C88.2 28.5 76.4 16.8 64.6 16.8 C52.8 16.8 41.0 28.5 36.7 50.0 C32.4 71.5 41.0 83.2 52.8 83.2 C64.6 83.2 76.4 71.5 80.7 50.0" 
        fill="none" stroke="#d8b4fe" stroke-width="1.5" stroke-linecap="round" opacity="0.4" stroke-dasharray="2 3"/>
  
  <!-- Буква D по центру -->
  <text x="50" y="76" font-family="monospace" font-size="72" font-weight="bold" fill="#d8b4fe" text-anchor="middle" letter-spacing="-2">Dw</text>
  
  <!-- Атмосферное свечение -->
  <circle cx="50" cy="50" r="44" fill="none" stroke="#6b21a8" stroke-width="0.5" opacity="0.12"/>
  <circle cx="50" cy="50" r="48" fill="none" stroke="#6b21a8" stroke-width="0.3" opacity="0.08"/>
</svg>